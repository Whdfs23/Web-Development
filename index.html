<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Input Mahasiswa</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header>
        <h1>Form Registrasi</h1>
        <p>Isi data dengan lengkap lalu klik <strong>Submit</strong></p>
    </header>

    <div class="wrapper">

        <!-- FORM CARD -->
        <div class="card">
            <div class="card-title"><span class="dot"></span>Data Diri Mahasiswa</div>

            <table class="form-table">
                <tr>
                    <td>Nama Lengkap <span>*</span></td>
                    <td>
                        <input type="text" id="nama" placeholder="Contoh: Dana Pratama" />
                        <div class="error-msg" id="errNama">Nama tidak boleh kosong.</div>
                    </td>
                </tr>
                <tr>
                    <td>NIM/NPM <span>*</span></td>
                    <td>
                        <input type="text" id="nim" placeholder="Contoh: 2200018001" />
                        <div class="error-msg" id="errNim">NIM/NPM tidak boleh kosong.</div>
                    </td>
                </tr>
                <tr>
                    <td>Jenis Kelamin <span>*</span></td>
                    <td>
                        <div class="radio-group">
                            <label><input type="radio" name="jk" value="Laki-laki" /> Laki-laki</label>
                            <label><input type="radio" name="jk" value="Perempuan" /> Perempuan</label>
                        </div>
                        <div class="error-msg" id="errJk">Pilih jenis kelamin.</div>
                    </td>
                </tr>
                <tr>
                    <td>Program Studi <span>*</span></td>
                    <td>
                        <select id="prodi">
                            <option value="">— Pilih Prodi —</option>
                            <option>Teknik Informatika</option>
                            <option>Teknologi Informasi</option>
                            <option>Sistem Informasi</option>
                            <option>Ilmu Komputer</option>
                            <option>Teknik Elektro</option>
                            <option>Sastra Mesin</option>
                            <option>Sastra Komputer</option>
                        </select>
                        <div class="error-msg" id="errProdi">Pilih program studi.</div>
                    </td>
                </tr>
                <tr>
                    <td>Semester</td>
                    <td>
                        <select id="semester">
                            <option value="">— Pilih Semester —</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                            <option>6</option>
                            <option>7</option>
                            <option>8</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Hobi</td>
                    <td>
                        <div class="checkbox-group">
                            <label><input type="checkbox" value="Coding" /> Coding</label>
                            <label><input type="checkbox" value="Desain" /> Desain</label>
                            <label><input type="checkbox" value="Gaming" /> Gaming</label>
                            <label><input type="checkbox" value="Musik" /> Musik</label>
                            <label><input type="checkbox" value="Olahraga" /> Olahraga</label>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>Email <span>*</span></td>
                    <td>
                        <input type="email" id="email" placeholder="contoh@email.com" />
                        <div class="error-msg" id="errEmail">Email tidak valid.</div>
                    </td>
                </tr>
                <tr>
                    <td>Alamat</td>
                    <td>
                        <textarea id="alamat" placeholder="Jl. Contoh No. 1, Kota..."></textarea>
                    </td>
                </tr>
            </table>

            <div class="btn-row">
                <button id="btnSubmit" onclick="submitForm()">Submit</button>
                <button id="btnReset" onclick="resetForm()">Reset</button>
            </div>
        </div>

        <!-- HASIL CARD -->
        <div class="card" id="hasilSection">
            <div class="card-title"><span class="dot"></span>Hasil Input</div>
            <table class="hasil-table" id="hasilTable"></table>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
